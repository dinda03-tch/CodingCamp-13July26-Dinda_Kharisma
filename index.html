<!DOCTYPE html>
<html lang="id" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Life Dashboard</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header>
    <span class="app-title">Life Dashboard</span>
    <div class="header-controls">
      <input id="user-name-input" type="text" placeholder="Your name..." aria-label="Your name" />
      <button id="save-name-btn">Save</button>
      <button id="theme-toggle" aria-label="Toggle dark mode">🌙</button>
    </div>
  </header>

  <section id="hero" aria-label="Clock and greeting">
    <div id="clock" aria-live="polite" aria-atomic="true"></div>
    <p id="date-display"></p>
    <p id="greeting" aria-live="polite"></p>
  </section>

  <main id="main-grid">
    <section id="focus-timer-section" aria-label="Focus Timer">
      <h2>Focus Timer</h2>
      <div id="timer-display" aria-live="polite" aria-atomic="true">25:00</div>
      <div class="timer-controls">
        <label for="timer-duration-input">Duration (min):</label>
        <input id="timer-duration-input" type="number" min="1" max="120" value="25" aria-label="Timer duration in minutes" />
        <button id="timer-start-btn">Start</button>
        <button id="timer-pause-btn" disabled>Pause</button>
        <button id="timer-reset-btn">Reset</button>
      </div>
    </section>

    <section id="task-section" aria-label="Task List">
      <h2>Tasks</h2>
      <form id="task-form" aria-label="Add new task">
        <input id="task-input" type="text" placeholder="New task..." required aria-label="New task text" />
        <select id="task-category-select" aria-label="Task category">
          <option value="Work">Work</option>
          <option value="Personal">Personal</option>
          <option value="Study">Study</option>
          <option value="Health">Health</option>
          <option value="Other">Other</option>
        </select>
        <button type="submit">Add</button>
      </form>
      <div id="task-filter-buttons" role="group" aria-label="Filter tasks by category"></div>
      <ul id="task-list" aria-label="Task list" aria-live="polite"></ul>
    </section>
  </main>

  <section id="quick-links-section" aria-label="Quick Links">
    <h2>Quick Links</h2>
    <form id="quick-link-form" aria-label="Add new quick link">
      <input id="ql-label-input" type="text" placeholder="Label" required aria-label="Quick link label" />
      <input id="ql-url-input" type="url" placeholder="https://..." required aria-label="Quick link URL" />
      <button type="submit">Add</button>
    </form>
    <div id="quick-links-list" role="list" aria-label="Quick links list" aria-live="polite"></div>
  </section>

  <footer>
    <p id="storage-warning" role="alert" hidden></p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
